stages:
  - lint
  - test
  - build
  - docker
  - deploy

variables:
  IMAGE_TAG: "$CI_COMMIT_SHA"
  DOCKER_REGISTRY: "gcr.io/vave-hrm"
  GKE_CLUSTER: "vave-hrm-cluster"
  GKE_ZONE: "us-central1-a"

lint:
  stage: lint
  image: node:20-alpine
  script:
    - npm ci
    - npm run lint

test:
  stage: test
  image: node:20-alpine
  script:
    - npm ci
    - npm test

build:
  stage: build
  image: node:20-alpine
  script:
    - npm ci
    - npm run build

docker:
  stage: docker
  image: docker:20.10.24-dind
  services:
    - docker:20.10.24-dind
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $DOCKER_REGISTRY
    - docker build -t $DOCKER_REGISTRY/backend:$IMAGE_TAG ./backend
    - docker push $DOCKER_REGISTRY/backend:$IMAGE_TAG
    - docker build -t $DOCKER_REGISTRY/frontend:$IMAGE_TAG ./frontend
    - docker push $DOCKER_REGISTRY/frontend:$IMAGE_TAG
  only:
    - main

deploy:
  stage: deploy
  image: google/cloud-sdk:433.0.0
  script:
    - echo "Deploying to GKE..."
    - gcloud auth activate-service-account --key-file=$GCP_SERVICE_ACCOUNT_KEY
    - gcloud container clusters get-credentials $GKE_CLUSTER --zone $GKE_ZONE --project $GCP_PROJECT_ID
    - kubectl set image deployment/backend backend=$DOCKER_REGISTRY/backend:$IMAGE_TAG
    - kubectl set image deployment/frontend frontend=$DOCKER_REGISTRY/frontend:$IMAGE_TAG
  environment:
    name: production
    url: https://app.vave-hrm.com
  only:
    - main
