version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vave-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vave_hrm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - vave-network

  redis:
    image: redis:7-alpine
    container_name: vave-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - vave-network

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: vave-backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASS=postgres
      - DB_NAME=vave_hrm
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=super-secret-development-key-change-this-in-production
    depends_on:
      - postgres
      - redis
    networks:
      - vave-network

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: vave-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api/v1
    depends_on:
      - backend
    networks:
      - vave-network

volumes:
  pgdata:
  redisdata:

networks:
  vave-network:
    driver: bridge
